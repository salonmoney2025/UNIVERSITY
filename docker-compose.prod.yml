# ===========================================
# EBKUST University Management System
# Production Docker Compose Configuration
# ===========================================
#
# This configuration is optimized for production deployment
# with full security, monitoring, and scalability features
#
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml down
#
# ===========================================

version: '3.8'

services:
  # ===========================================
  # PostgreSQL Database (Production)
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: university_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-university_lms}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # Required in production
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - university_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=2621kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB

  # ===========================================
  # Redis Cache (Production)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: university_redis_prod
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - university_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ===========================================
  # RabbitMQ Message Broker (Production)
  # ===========================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: university_rabbitmq_prod
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      RABBITMQ_DEFAULT_VHOST: university
      RABBITMQ_VM_MEMORY_HIGH_WATERMARK: 512MB
    ports:
      - "127.0.0.1:15672:15672"  # Management UI (localhost only)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - university_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ===========================================
  # Django Backend API (Production)
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: university_backend_prod
    restart: always
    command: >
      gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 4
      --threads 2
      --worker-class gthread
      --worker-tmp-dir /dev/shm
      --max-requests 1000
      --max-requests-jitter 50
      --timeout 120
      --graceful-timeout 30
      --keep-alive 5
      --access-logfile -
      --error-logfile -
      --log-level info
    volumes:
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media
      - ./backend/logs:/app/logs
    env_file:
      - .env.production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - university_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  # ===========================================
  # Rust API v2 (Production)
  # ===========================================
  rust-api:
    build:
      context: ./rust
      dockerfile: Dockerfile.api
      args:
        - RUST_VERSION=1.75
    container_name: university_rust_api_prod
    restart: always
    environment:
      UMS__SERVER__HOST: "0.0.0.0"
      UMS__SERVER__PORT: "8081"
      UMS__DATABASE__URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-university_lms}"
      UMS__DATABASE__MAX_CONNECTIONS: "20"
      UMS__DATABASE__MIN_CONNECTIONS: "5"
      UMS__DATABASE__CONNECT_TIMEOUT_SECONDS: "30"
      UMS__JWT__SECRET: "${JWT_SECRET}"
      UMS__JWT__EXPIRATION_HOURS: "24"
      UMS__RABBITMQ__URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/university"
      UMS__RABBITMQ__EXCHANGE: "ums"
      RUST_LOG: "api=info,shared=info,sqlx=warn"
      RUST_BACKTRACE: "1"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - university_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 256M

  # ===========================================
  # Celery Worker (Production)
  # ===========================================
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: university_celery_worker_prod
    restart: always
    command: >
      celery -A config worker
      --loglevel=info
      --concurrency=4
      --max-tasks-per-child=1000
      --time-limit=300
      --soft-time-limit=270
    volumes:
      - media_volume:/app/media
      - ./backend/logs:/app/logs
    env_file:
      - .env.production
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - university_network
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ===========================================
  # Celery Beat Scheduler (Production)
  # ===========================================
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: university_celery_beat_prod
    restart: always
    command: celery -A config beat --loglevel=info
    volumes:
      - ./backend/logs:/app/logs
    env_file:
      - .env.production
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - university_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ===========================================
  # Next.js Frontend (Production)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: university_frontend_prod
    restart: always
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
    env_file:
      - .env.production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - university_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M

  # ===========================================
  # Nginx Reverse Proxy (Production)
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: university_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/var/www/static:ro
      - media_volume:/var/www/media:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - rust-api
      - frontend
    networks:
      - university_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 128M

# ===========================================
# Networks
# ===========================================
networks:
  university_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16

# ===========================================
# Volumes (Persistent Data)
# ===========================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
  nginx_logs:
    driver: local
