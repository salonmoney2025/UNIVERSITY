services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: university_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-university_lms}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - university_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: university_redis
    volumes:
      - redis_data:/data
    networks:
      - university_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: university_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - university_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Django Backend (API v1)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: university_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - university_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # Rust API (API v2)
  rust-api:
    build:
      context: ./rust
      dockerfile: Dockerfile.api
    container_name: university_rust_api
    environment:
      UMS__SERVER__HOST: "0.0.0.0"
      UMS__SERVER__PORT: "8081"
      UMS__DATABASE__URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres123}@postgres:5432/${DB_NAME:-university_lms}"
      UMS__DATABASE__MAX_CONNECTIONS: "10"
      UMS__DATABASE__MIN_CONNECTIONS: "2"
      UMS__DATABASE__CONNECT_TIMEOUT_SECONDS: "30"
      UMS__JWT__SECRET: "${JWT_SECRET:-your-secret-key-change-in-production-min-32-chars}"
      UMS__JWT__EXPIRATION_HOURS: "24"
      UMS__RABBITMQ__URL: "amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672"
      UMS__RABBITMQ__EXCHANGE: "ums"
      RUST_LOG: "api=debug,shared=debug,sqlx=warn"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - university_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: university_celery_worker
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis
      - rabbitmq
    networks:
      - university_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A config inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: university_celery_beat
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      - backend
      - redis
      - rabbitmq
    networks:
      - university_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f celerybeat-schedule && python -c 'import os; import time; exit(0 if time.time() - os.path.getmtime(\"celerybeat-schedule\") < 300 else 1)' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # Next.js Frontend (Turbopack Dev Mode - Optimized)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: university_frontend
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      - DOCKER_ENV=true
      - NODE_ENV=development
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - university_network
    restart: unless-stopped

  # Nginx Reverse Proxy (API Gateway)
  nginx:
    image: nginx:alpine
    container_name: university_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/var/www/static
      - media_volume:/var/www/media
    depends_on:
      - backend
      - rust-api
      - frontend
    networks:
      - university_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  university_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  static_volume:
  media_volume:
